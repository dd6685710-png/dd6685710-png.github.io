<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片颜色聚类可视化</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 20px;
        }
        h1 {
            grid-column: 1 / -1;
            text-align: center;
            color: #1a202c;
            margin-bottom: 10px;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
        }
        input, select, button {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2b6cb0;
        }
        #imagePreview {
            max-width: 100%;
            max-height: 500px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        .chart-container {
            width: 100%;
            height: 500px;
        }
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        .color-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            background: #f7fafc;
        }
        .color-block {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }
        .color-text {
            font-size: 14px;
            color: #2d3748;
        }
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片颜色聚类可视化系统</h1>

        <!-- 左侧：图片上传与控制 -->
        <div class="card">
            <div class="control-panel">
                <div class="control-group">
                    <label for="imageUpload">选择图片</label>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>
                <div class="control-group">
                    <label for="kValue">聚类数 K (≥5)</label>
                    <input type="number" id="kValue" min="5" max="20" value="5">
                </div>
                <div class="control-group">
                    <label for="colorSpace">颜色空间</label>
                    <select id="colorSpace">
                        <option value="rgb">RGB</option>
                        <option value="lab">LAB</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="chartType">图表类型</label>
                    <select id="chartType">
                        <option value="pie">饼图</option>
                        <option value="bar">柱状图</option>
                    </select>
                </div>
                <button id="analyzeBtn">开始分析</button>
                <button id="aiCheckBtn" style="background: #805ad5;">AI 颜色和谐度检测</button>
            </div>

            <img id="imagePreview" alt="图片预览">
            <div class="color-palette" id="colorPalette"></div>
        </div>

        <!-- 右侧：ECharts 可视化 -->
        <div class="card">
            <div class="chart-container" id="chartContainer"></div>
        </div>
    </div>

    <script>
        // 全局变量
        let myChart = null;
        let currentClusters = null;

        // 初始化 ECharts
        window.onload = function() {
            myChart = echarts.init(document.getElementById('chartContainer'));
            // 监听窗口大小变化，自动调整图表
            window.addEventListener('resize', () => myChart.resize());
            // 绑定事件
            document.getElementById('analyzeBtn').addEventListener('click', analyzeImage);
            document.getElementById('chartType').addEventListener('change', updateChart);
            document.getElementById('aiCheckBtn').addEventListener('click', checkColorHarmony);
        };

        // 图片上传预览
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('imagePreview').src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // K-Means 聚类核心算法
        function kMeans(pixels, k, maxIter = 10) {
            // 随机初始化聚类中心
            let centroids = [];
            const used = new Set();
            while (centroids.length < k) {
                const idx = Math.floor(Math.random() * pixels.length);
                if (!used.has(idx)) {
                    used.add(idx);
                    centroids.push([...pixels[idx]]);
                }
            }

            for (let iter = 0; iter < maxIter; iter++) {
                // 分配阶段：将每个像素分配到最近的中心
                const clusters = Array.from({ length: k }, () => []);
                for (const pixel of pixels) {
                    let minDist = Infinity;
                    let clusterIdx = 0;
                    for (let i = 0; i < k; i++) {
                        const dist = euclideanDistance(pixel, centroids[i]);
                        if (dist < minDist) {
                            minDist = dist;
                            clusterIdx = i;
                        }
                    }
                    clusters[clusterIdx].push(pixel);
                }

                // 更新阶段：重新计算每个簇的中心
                const newCentroids = [];
                for (const cluster of clusters) {
                    if (cluster.length === 0) {
                        // 空簇，保留原中心
                        newCentroids.push([...centroids[newCentroids.length]]);
                        continue;
                    }
                    const mean = cluster.reduce((acc, p) => [
                        acc[0] + p[0],
                        acc[1] + p[1],
                        acc[2] + p[2]
                    ], [0, 0, 0]).map(v => v / cluster.length);
                    newCentroids.push(mean);
                }

                // 检查是否收敛
                if (arraysEqual(centroids, newCentroids)) break;
                centroids = newCentroids;
            }

            // 统计每个簇的像素数量
            const clusters = Array.from({ length: k }, () => []);
            for (const pixel of pixels) {
                let minDist = Infinity;
                let clusterIdx = 0;
                for (let i = 0; i < k; i++) {
                    const dist = euclideanDistance(pixel, centroids[i]);
                    if (dist < minDist) {
                        minDist = dist;
                        clusterIdx = i;
                    }
                }
                clusters[clusterIdx].push(pixel);
            }

            return {
                centroids: centroids.map(c => c.map(Math.round)),
                counts: clusters.map(c => c.length)
            };
        }

        // 欧氏距离计算
        function euclideanDistance(a, b) {
            return Math.sqrt(
                Math.pow(a[0] - b[0], 2) +
                Math.pow(a[1] - b[1], 2) +
                Math.pow(a[2] - b[2], 2)
            );
        }

        // 数组相等判断
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                for (let j = 0; j < 3; j++) {
                    if (Math.abs(a[i][j] - b[i][j]) > 1) return false;
                }
            }
            return true;
        }

        // RGB 转 LAB 颜色空间
        function rgbToLab(r, g, b) {
            // 归一化到 0-1
            r /= 255; g /= 255; b /= 255;
            // sRGB 转线性 RGB
            r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
            g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
            b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
            // 线性 RGB 转 XYZ
            const x = r * 0.4124564 + g * 0.3575761 + b * 0.1804375;
            const y = r * 0.2126729 + g * 0.7151522 + b * 0.0721750;
            const z = r * 0.0193339 + g * 0.1191920 + b * 0.9503041;
            // XYZ 转 LAB (D65 白点)
            const xn = 0.95047, yn = 1.0, zn = 1.08883;
            const fx = x / xn > 0.008856 ? Math.pow(x / xn, 1/3) : (903.3 * (x / xn) + 16) / 116;
            const fy = y / yn > 0.008856 ? Math.pow(y / yn, 1/3) : (903.3 * (y / yn) + 16) / 116;
            const fz = z / zn > 0.008856 ? Math.pow(z / zn, 1/3) : (903.3 * (z / zn) + 16) / 116;
            const L = 116 * fy - 16;
            const a = 500 * (fx - fy);
            const b_ = 200 * (fy - fz);
            return [L, a, b_];
        }

        // 图片分析主函数
        function analyzeImage() {
            const img = document.getElementById('imagePreview');
            const k = parseInt(document.getElementById('kValue').value);
            const colorSpace = document.getElementById('colorSpace').value;

            if (!img.src) {
                alert('请先选择一张图片！');
                return;
            }
            if (k < 5) {
                alert('聚类数 K 必须 ≥ 5！');
                return;
            }

            // 创建 canvas 读取像素
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // 提取像素（降采样，避免计算量过大）
            const pixels = [];
            const step = Math.max(1, Math.floor(data.length / 100000)); // 最多处理 10w 像素
            for (let i = 0; i < data.length; i += 4 * step) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                if (colorSpace === 'lab') {
                    const [L, a, b_] = rgbToLab(r, g, b);
                    pixels.push([L, a, b_]);
                } else {
                    pixels.push([r, g, b]);
                }
            }

            // 执行 K-Means 聚类
            const result = kMeans(pixels, k);
            currentClusters = result;

            // 生成颜色调色板
            const palette = document.getElementById('colorPalette');
            palette.innerHTML = '';
            const colors = [];
            const names = [];
            for (let i = 0; i < k; i++) {
                let [r, g, b] = result.centroids[i];
                // LAB 空间需要转回 RGB 显示
                if (colorSpace === 'lab') {
                    // 简化转换（实际项目可使用完整 LAB→RGB 算法）
                    r = Math.max(0, Math.min(255, r * 2.55));
                    g = Math.max(0, Math.min(255, g + 128));
                    b = Math.max(0, Math.min(255, b + 128));
                }
                const hex = rgbToHex(r, g, b);
                colors.push(hex);
                names.push(`#${hex}`);
                const item = document.createElement('div');
                item.className = 'color-item';
                item.innerHTML = `
                    <div class="color-block" style="background-color: #${hex};"></div>
                    <span class="color-text">#${hex} (数量: ${result.counts[i]})</span>
                `;
                palette.appendChild(item);
            }

            // 更新图表
            updateChart(colors, names, result.counts);
        }

        // RGB 转 Hex
        function rgbToHex(r, g, b) {
            return [r, g, b].map(x => {
                const hex = Math.round(x).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        // 更新 ECharts 图表
        function updateChart(colors, names, counts) {
            const chartType = document.getElementById('chartType').value;
            let option = {};

            if (chartType === 'pie') {
                option = {
                    title: {
                        text: '图片颜色聚类分布（饼图）',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}: {c} 像素 ({d}%)'
                    },
                    legend: {
                        orient: 'vertical',
                        left: 'left'
                    },
                    series: [
                        {
                            name: '颜色占比',
                            type: 'pie',
                            radius: '70%',
                            data: counts.map((count, i) => ({
                                value: count,
                                name: names[i],
                                itemStyle: { color: `#${colors[i]}` }
                            })),
                            emphasis: {
                                itemStyle: {
                                    shadowBlur: 10,
                                    shadowOffsetX: 0,
                                    shadowColor: 'rgba(0, 0, 0, 0.5)'
                                }
                            }
                        }
                    ]
                };
            } else {
                option = {
                    title: {
                        text: '图片颜色聚类分布（柱状图）',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'shadow' }
                    },
                    xAxis: {
                        type: 'category',
                        data: names,
                        axisLabel: { rotate: 45 }
                    },
                    yAxis: {
                        type: 'value',
                        name: '像素数量'
                    },
                    series: [
                        {
                            name: '像素数量',
                            type: 'bar',
                            data: counts,
                            itemStyle: {
                                color: function(params) {
                                    return `#${colors[params.dataIndex]}`;
                                }
                            }
                        }
                    ]
                };
            }

            myChart.setOption(option, true);
        }

        // AI 颜色和谐度检测（预留接口）
        async function checkColorHarmony() {
            if (!currentClusters) {
                alert('请先完成图片聚类分析！');
                return;
            }
            const colors = currentClusters.centroids.map(c => {
                const hex = rgbToHex(c[0], c[1], c[2]);
                return `#${hex}`;
            });
            const prompt = `请判断以下 ${colors.length} 个颜色的搭配是否和谐：${colors.join(', ')}。请给出详细分析和评分（1-10分）。`;

            // 这里需要替换为你自己的 CloseAI API 调用
            alert('AI 检测功能需要配置 API 密钥，当前为演示模式。\n颜色列表：' + colors.join(', '));
            // 示例 API 调用（需自行实现）
            // const response = await fetch('https://api.closeai-asia.com/v1/chat/completions', {
            //     method: 'POST',
            //     headers: {
            //         'Content-Type': 'application/json',
            //         'Authorization': 'Bearer YOUR_API_KEY'
            //     },
            //     body: JSON.stringify({
            //         model: 'gpt-3.5-turbo',
            //         messages: [{ role: 'user', content: prompt }]
            //     })
            // });
            // const result = await response.json();
            // alert(result.choices[0].message.content);
        }
    </script>
</body>
